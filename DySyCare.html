<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Tutor Sistem Pencernaan</title>

<style>

body{
    font-family:Arial, sans-serif;
    background:#eef3ff;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#2b4eff;
}

.input-group{
    margin-bottom:15px;
}

label{
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-top:5px;
    box-sizing:border-box;
}

textarea{
    height:120px;
}

button{
    background:#2b4eff;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1736c9;
}

.chat-box{
    margin-top:20px;
    background:#f7f9ff;
    border-radius:15px;
    padding:20px;
    min-height:120px;
    white-space:pre-wrap;
}

.info{
    background:#dfe9ff;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>DySyCare</h1>

<div class="info">
AI ini hanya membahas:
<ul>
<li>Gangguan sistem pencernaan manusia</li>
<li>Penyakit sistem pencernaan</li>
<li>Sanitasi dan kesehatan</li>
<li>SDG 3 dan SDG 6</li>
<li>Kebiasaan hidup sehat</li>
</ul>
</div>

<div class="input-group">
<label>Nama Lengkap</label>
<input type="text" id="nama">
</div>

<div class="input-group">
<label>Kelas</label>
<input type="text" id="kelas">
</div>

<div class="input-group">
<label>Nomor Absen</label>
<input type="text" id="absen">
</div>

<div class="input-group">
<label>Pertanyaan</label>
<textarea id="question"
placeholder="Tulis pertanyaanmu di sini..."></textarea>
</div>

<button onclick="askAI()">Kirim Pertanyaan</button>

<div class="chat-box" id="response">
Jawaban AI akan muncul di sini...
</div>

</div>

<script>

async function askAI(){

const nama = document.getElementById("nama").value.trim();
const kelas = document.getElementById("kelas").value.trim();
const absen = document.getElementById("absen").value.trim();
const question = document.getElementById("question").value.trim();

if(nama === "" || kelas === "" || absen === ""){

document.getElementById("response").innerHTML =
"Silakan isi nama lengkap, kelas, dan nomor absen terlebih dahulu.";

return;

}

const apiKey = "AIzaSyAKGBTlt0rFl9pUtzDBuIDLHQY3WRdypdI";

const systemPrompt = `
Kamu adalah asisten guru yang bertugas untuk memberikan bantuan kepada siswa mengenai materi gangguan dan penyakit pada sistem pencernaan manusia dan juga Education for Sustainable Development nomor 3 dan 6.

Saat ditanya, kamu akan memberikan jawaban sesuai yang ditanyakan oleh siswa. Mereka harus spesifik bertanya mengenai apa yang ingin mereka ketahui.

Kamu juga bertugas untuk melatihkan kompetensi berpikir kritis pada siswa dengan membantu siswa untuk menjawab pertanyaan nya sendiri, bukan langsung mendapatkan jawaban secara langsung.

Panggil siswa dengan nama ${nama}.

Data siswa:
Nama: ${nama}
Kelas: ${kelas}
Nomor Absen: ${absen}

Jika pertanyaan di luar topik:
- Biologi selain sistem pencernaan
- astronomi
- Bahasa Inggris
- Bahasa Indonesia
- Pendidikan Pancasila
- Fisika
- Matematika
- Kimia
- Sejarah
- Filsafat
- Ekonomi
- investasi
- olahraga
- politik
- psikologi
- sosiologi
- translate bahasa
- atau topik lainnya

maka jawab:
"Pertanyaan tersebut tidak sesuai dengan materi yang sedang dipelajari."

Jika diminta translate bahasa maka jawab:
"Saya tidak dapat membantu translate bahasa."

Jangan langsung memberikan jawaban final.
Berikan petunjuk, pertanyaan pemancing, dan arahan berpikir kritis.

Fokus hanya pada:
- gangguan sistem pencernaan
- penyakit sistem pencernaan
- sanitasi
- SDG 3
- SDG 6
- kesehatan pencernaan
- kebiasaan hidup sehat

Pertanyaan siswa:
${question}
`;

try{

document.getElementById("response").innerHTML =
"AI sedang berpikir...";

const response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
contents:[
{
parts:[
{
text:systemPrompt
}
]
}
]
})
}
);

const data = await response.json();

const result =
data.candidates[0].content.parts[0].text;

document.getElementById("response").innerHTML =
result;

}catch(error){

document.getElementById("response").innerHTML =
"Gagal terhubung ke Gemini API.";

console.log(error);

}

}

</script>

</body>
</html>
